<section>
    <h3 class="page-title">Dashboard Athlete</h3>

    <div class="row g-3 mb-4">
        <div class="col-12 col-sm-6 col-xl-3" *ngFor="let stat of stats">
            <div class="card stat-card p-3">
                <small>{{ stat.label }}</small>
                <h4 class="mb-0 mt-2">{{ stat.value }}</h4>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <h5 class="mb-3">Prochaines seances</h5>
        <div class="session-row" *ngFor="let session of nextSessions">
            <div>
                <div class="session-title">{{ session.title }}</div>
                <small>{{ session.date }}</small>
            </div>
            <span class="badge badge-light">{{ session.coach }}</span>
        </div>
    </div>
</section>
