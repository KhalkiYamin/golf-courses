<section>
    <h3 class="page-title">Ressources</h3>
    <div class="row g-3">
        <div class="col-12 col-md-6 col-xl-4" *ngFor="let resource of resources">
            <div class="card p-3 resource-card">
                <h6 class="mb-1">{{ resource.title }}</h6>
                <small class="d-block">Type: {{ resource.type }}</small>
                <small>Mis à jour: {{ resource.updated }}</small>
            </div>
        </div>
    </div>
</section>
